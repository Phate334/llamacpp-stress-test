services:
  test:
    image: ghcr.io/ggml-org/llama.cpp:full-cuda-b8576
    volumes:
      - ./model-cache:/root/.cache
      - ./results:/app/results
      - ./bench-helper.sh:/app/bench-helper.sh
    entrypoint: [ "/app/bench-helper.sh" ]
    command: [ "-hf", "lmstudio-community/gemma-3-1B-it-qat-GGUF:Q4_0", "-ngl", "99", "-c", "4096", "-fa", "on", "--fit", "off", "-npp", "256", "-ntg", "128", "-npl", "1,2,3" ]
    devices:
      - "nvidia.com/gpu=all"

  server:
    image: python:3.13-slim
    ports:
      - "8000:8000"
    volumes:
      - ./results:/app
    command: python -m http.server -d /app
